apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ingress-network-policy
  namespace: nsse
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
      - ipBlock:
          cidr: 0.0.0.0/0
    - from:
      - podSelector:
          matchLabels:
            application: not-so-simple-ecommerce
      ports:
      - port: 4443
    - from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: kube-system
      ports:
      - port: 4443
    - from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: argocd
      ports:
      - port: 4443
    # argo-rollouts controller runs the prePromotionAnalysis web checks
    - from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: argo-rollouts
      ports:
      - port: 4443
