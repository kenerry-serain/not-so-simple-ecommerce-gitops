# Shared pre-promotion analysis: polls the preview service health endpoint.
# Rendered name after kustomize transformers: nsse-health-check-prod
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: health-check
spec:
  args:
    - name: url
  metrics:
    - name: health
      interval: 10s
      count: 6
      failureLimit: 1
      successCondition: result == "Healthy"
      provider:
        web:
          url: "{{args.url}}"
          jsonPath: "{$.status}"
          insecure: true # kestrel self-signed certificate
          timeoutSeconds: 15
